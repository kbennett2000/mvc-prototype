# Decap CMS configuration for Majestic View Church.
# Edit this file to change which fields editors see in the CMS.
# Every collection below maps to files in /content/ that Next.js reads at build.

# ---------- Backend ----------
# In production: Decap uses GitHub (the `backend.name: github` setting below).
# In local development: when `local_backend: true` AND the decap-server proxy
# is running on localhost:8081, Decap writes directly to your /content/ folder
# without going through GitHub at all. Falls back to GitHub automatically in
# production (where the localhost proxy doesn't exist).
#
# Start the local backend with:    npm run cms
# (run it in a separate terminal alongside `npm run start`)
local_backend: true

# Production backend. Update `repo:` to your real GitHub repo before deploying.
# The CMS uses GitHub OAuth — see docs/for-tech-volunteers/08-grant-editor-access.md.
backend:
  name: github
  repo: your-org/mvc-revamp
  branch: main
  commit_messages:
    create: "Add {{collection}} '{{slug}}' (via CMS)"
    update: "Update {{collection}} '{{slug}}' (via CMS)"
    delete: "Remove {{collection}} '{{slug}}' (via CMS)"
    uploadMedia: "Upload '{{path}}' (via CMS)"
    deleteMedia: "Delete '{{path}}' (via CMS)"

# Every change becomes a Pull Request rather than a direct commit (production).
# In local_backend mode, changes are written directly to disk.
publish_mode: editorial_workflow

# Image uploads land here. The /public/ prefix is stripped in the URLs.
media_folder: public/images/uploads
public_folder: /images/uploads

# What editors see in the top bar of the CMS.
site_url: https://mvckiowa.com
display_url: https://mvckiowa.com
logo_url: /images/imported/mvc-logo.png

# ---------- Collections ----------
collections:
  # =====================================================================
  # 1. SERMONS — most common task. Editors add a new sermon every Sunday.
  # =====================================================================
  - name: sermons
    label: "Sermons"
    label_singular: "Sermon"
    folder: content/sermons
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date | date('YYYY-MM-DD')}} — {{title}} ({{speaker}})"
    sortable_fields: [date, title, speaker]
    view_filters:
      - label: This year
        field: date
        pattern: "2026"
      - label: Pastor John Smith
        field: speaker
        pattern: "John Smith"
    fields:
      - { name: title, label: "Sermon Title", widget: string, hint: "Shown on the watch page and in the homepage 'latest sermon' section." }
      - { name: date, label: "Date Preached", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: false, hint: "The Sunday this sermon was preached." }
      - { name: speaker, label: "Speaker", widget: string, hint: "Who preached this message. Usually a pastor, sometimes a guest." }
      - { name: series, label: "Series", widget: string, hint: "What series this sermon is part of. Use 'Standalone Messages' for one-offs.", default: "Standalone Messages" }
      - { name: scripture, label: "Scripture Reference", widget: string, hint: "e.g. 'Ruth 2:1-23' or 'Matthew 5:1-12'." }
      - { name: book, label: "Book of the Bible", widget: string, hint: "Just the book name — used for filtering. e.g. 'Ruth', 'Matthew', 'Psalms'." }
      - { name: youtubeId, label: "YouTube Video ID", widget: string, required: false, hint: "Just the ID part of the URL — the bit after 'v='. Leave blank if there's no video yet." }
      - { name: audioUrl, label: "Audio File URL", widget: string, required: false, default: "#", hint: "Direct link to an MP3 of the sermon. Leave as '#' if no audio yet." }
      - { name: notesUrl, label: "Sermon Notes (PDF)", widget: file, required: false, default: "#", hint: "Upload a PDF of the sermon notes. Optional." }
      - { name: thumbnail, label: "Thumbnail Image", widget: image, required: false, hint: "16:9 image shown on the sermon card. If left blank, the sanctuary photo is used." }
      - { name: body, label: "Description", widget: text, hint: "One or two sentences. Shown under the sermon title.", default: "" }

  # =====================================================================
  # 2. MINISTRIES — Kids, Youth, Women's, etc. Each has its own page.
  # =====================================================================
  - name: ministries
    label: "Ministries"
    label_singular: "Ministry"
    folder: content/ministries
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    summary: "{{title}} — {{tagline}}"
    fields:
      - { name: title, label: "Ministry Name", widget: string, hint: "Shown on the ministry's own page and on the homepage card. e.g. 'MVC Kids'." }
      - { name: slug, label: "URL Slug", widget: string, hint: "The address piece. 'kids' becomes /ministries/kids. Use lowercase letters and hyphens only. Don't change this once a ministry is published." }
      - { name: tagline, label: "Tagline", widget: string, hint: "One sentence shown as the main headline on the ministry's hero." }
      - { name: description, label: "Short Description", widget: text, hint: "Shown on the homepage ministry card. 1-2 sentences." }
      - { name: image, label: "Hero Image", widget: image, hint: "Wide photo for the top of the ministry page." }
      - { name: whoFor, label: "Who It's For", widget: string, required: false, hint: "Short phrase, e.g. 'Newborn through 5th grade.' Leave blank to hide that card." }
      - name: meetings
        label: "Meeting Times"
        widget: list
        required: false
        summary: "{{fields.day}} at {{fields.time}} — {{fields.location}}"
        hint: "When and where this ministry gathers. Add one entry per recurring meeting."
        fields:
          - { name: day, label: "Day", widget: string, hint: "e.g. 'Sundays', 'Second Saturdays', 'Wednesdays'." }
          - { name: time, label: "Time", widget: string, hint: "e.g. '9:00 AM' or '6:00-7:30 PM'." }
          - { name: location, label: "Location", widget: string, hint: "Room name or building." }
          - { name: note, label: "Note", widget: string, required: false, hint: "Optional small print. e.g. 'School year only' or 'Childcare provided'." }
      - name: whatToExpect
        label: "What to Expect"
        widget: list
        required: false
        field: { name: item, label: "Item", widget: string }
        hint: "Short bullet points. e.g. 'Bible-based teaching at every gathering.' Leave empty to hide the section."
      - name: leader
        label: "Ministry Leader"
        widget: object
        hint: "If there's no named leader yet, leave the Name field empty — the page will fall back to the church office contact."
        fields:
          - { name: name, label: "Leader Name", widget: string, required: false, default: "" }
          - { name: role, label: "Leader Role", widget: string, required: false, default: "" }
          - { name: email, label: "Leader Email", widget: string, required: false, default: "" }
          - { name: photo, label: "Leader Photo", widget: image, required: false, default: "" }
      - name: gallery
        label: "Photo Gallery"
        widget: list
        required: false
        field: { name: image, label: "Photo", widget: image }
        hint: "Photos that show life in this ministry. Drag to reorder."
      - { name: body, label: "Long Description", widget: markdown, required: false, hint: "Optional fuller writeup. Not currently shown on the page but stored for future use." }

  # =====================================================================
  # 3. STAFF — Paid pastors and staff. Renders on /about and /connect/contact.
  # =====================================================================
  - name: staff
    label: "Staff"
    label_singular: "Staff Member"
    folder: content/staff
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    summary: "{{name}} — {{role}}"
    sortable_fields: [order, name]
    fields:
      - { name: name, label: "Full Name", widget: string, hint: "How they want their name shown. e.g. 'Pastor John Smith'." }
      - { name: role, label: "Role / Title", widget: string, hint: "e.g. 'Senior Pastor', 'Worship Director', 'Office Manager'." }
      - { name: email, label: "Email", widget: string, required: false, default: "", hint: "Public email address. Leave blank to show 'Contact via church office' instead." }
      - { name: photo, label: "Photo", widget: image, hint: "Headshot. Square works best — the site crops to a circle." }
      - { name: order, label: "Display Order", widget: number, value_type: int, min: 1, hint: "1 = first. Senior Pastor usually goes first." }
      - { name: body, label: "Bio", widget: text, hint: "2-3 sentences. What people would want to know meeting them on a Sunday." }

  # =====================================================================
  # 4. ELDERS — Lay (and pastoral) elders who govern the church.
  # =====================================================================
  - name: elders
    label: "Elders"
    label_singular: "Elder"
    folder: content/elders
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    summary: "{{name}}"
    sortable_fields: [order, name]
    fields:
      - { name: name, label: "Full Name", widget: string }
      - { name: occupation, label: "Occupation / Background", widget: string, required: false, default: "", hint: "What they do outside of church. e.g. 'Cattle rancher', 'Retired Air Force chaplain'. Leave blank if not applicable." }
      - { name: photo, label: "Photo", widget: image }
      - { name: order, label: "Display Order", widget: number, value_type: int, min: 1 }
      - { name: body, label: "Bio", widget: text, hint: "2-3 sentences about their family and ministry history." }

  # =====================================================================
  # 5. SITE SETTINGS — singleton. Church identity + site-wide copy.
  # =====================================================================
  - name: settings
    label: "Site Settings"
    delete: false
    editor: { preview: false }
    files:
      - name: site
        label: "Church Info & Site Copy"
        file: content/site.json
        format: json
        fields:
          - name: church
            label: "Church Information"
            widget: object
            fields:
              - { name: name, label: "Full Church Name", widget: string, hint: "e.g. 'Majestic View Church'." }
              - { name: shortName, label: "Short Name / Acronym", widget: string, hint: "e.g. 'MVC'. Used as a fallback throughout the site." }
              - { name: tagline, label: "Tagline", widget: string, hint: "One short sentence used in the footer." }
              - name: address
                label: "Address"
                widget: object
                fields:
                  - { name: street, label: "Street", widget: string }
                  - { name: city, label: "City", widget: string }
                  - { name: state, label: "State Code", widget: string, hint: "Two letters. e.g. 'CO'." }
                  - { name: zip, label: "ZIP Code", widget: string }
              - { name: phone, label: "Phone Number", widget: string, hint: "Format: '303-491-4339'." }
              - { name: email, label: "Church Email", widget: string, hint: "The general admin inbox. e.g. 'admin@mvckiowa.com'." }
              - name: services
                label: "Services"
                widget: list
                hint: "Add one entry per regular gathering — Sunday morning, Wednesday evening, Saturday vigil, Spanish service, etc. Mark exactly one as the 'primary' service (shown in the homepage hero and footer)."
                summary: "{{day}}s at {{time}}{{#if name}} — {{name}}{{/if}}"
                fields:
                  - { name: name, label: "Service Name", widget: string, required: false, default: "", hint: "Optional. Use when distinguishing services. e.g. 'Traditional', 'Contemporary', 'Spanish Service'. Leave blank if you only have one service or names aren't needed." }
                  - { name: day, label: "Day", widget: string, default: "Sunday", hint: "e.g. 'Sunday', 'Wednesday', 'Saturday'." }
                  - { name: time, label: "Start Time", widget: string, hint: "e.g. '9:00 AM' or '6:30 PM'." }
                  - { name: note, label: "Note", widget: string, required: false, default: "", hint: "Optional after-service or distinguishing note. e.g. 'Fellowship & coffee after' or 'Communion service'." }
                  - { name: primary, label: "Use as main service?", widget: boolean, default: false, hint: "Pick exactly one. The primary service appears in the homepage hero and footer where only one time can be shown." }
              - { name: officeHours, label: "Office Hours", widget: string, hint: "e.g. 'Mon-Thu'." }
              - name: social
                label: "Social Media"
                widget: object
                fields:
                  - { name: facebook, label: "Facebook URL", widget: string, required: false, default: "" }
                  - { name: youtube, label: "YouTube URL", widget: string, required: false, default: "" }
          - name: home
            label: "Homepage Copy"
            widget: object
            fields:
              - name: hero
                label: "Hero Section"
                widget: object
                fields:
                  - { name: headline, label: "Headline", widget: string, hint: "The big sentence on the homepage. Shows over the church photo." }
          - name: about
            label: "About Page Copy"
            widget: object
            fields:
              - name: hero
                label: "Hero Section"
                widget: object
                fields:
                  - { name: headline, label: "Headline", widget: string, hint: "The big sentence on the About page." }

  # =====================================================================
  # 6. BELIEFS — Doctrinal statements shown on /beliefs and /about.
  # =====================================================================
  - name: beliefs
    label: "What We Believe"
    delete: false
    files:
      - name: beliefs
        label: "Doctrinal Statements"
        file: content/beliefs.json
        format: json
        fields:
          - name: beliefs
            label: "Statements"
            widget: list
            hint: "Order matters — these show in the order listed here. Drag to reorder."
            summary: "{{title}}"
            fields:
              - { name: title, label: "Belief Title", widget: string, hint: "e.g. 'The Bible', 'Salvation', 'Jesus Christ'." }
              - { name: statement, label: "Full Statement", widget: text, hint: "1-3 sentences. Include the Scripture reference in parentheses at the end if applicable." }

  # =====================================================================
  # 7. EVENTS — Recurring events shown on /calendar.
  # =====================================================================
  - name: events
    label: "Recurring Events"
    delete: false
    files:
      - name: events
        label: "Calendar — Recurring Events"
        file: content/events.json
        format: json
        fields:
          - name: events
            label: "Events"
            widget: list
            summary: "{{title}} ({{time}})"
            hint: "Weekly or monthly events. One-off events are handled separately."
            fields:
              - { name: id, label: "Internal ID", widget: string, hint: "Lowercase letters and hyphens. e.g. 'sunday-service'. Don't change this once an event is created." }
              - { name: title, label: "Event Name", widget: string }
              - { name: time, label: "Start Time", widget: string, hint: "e.g. '9:00 AM' or '6:30 PM'." }
              - { name: durationMinutes, label: "Duration (minutes)", widget: number, value_type: int, min: 15, max: 480, default: 60 }
              - { name: location, label: "Location", widget: string }
              - { name: description, label: "Description", widget: text }
              - name: rule
                label: "When It Recurs"
                widget: object
                fields:
                  - { name: kind, label: "Recurrence Type", widget: select, options: ["weekly", "nth-of-month", "last-of-month"], hint: "'weekly' = every week on the same day. 'nth-of-month' = e.g. second Saturday. 'last-of-month' = e.g. last Sunday." }
                  - { name: dayOfWeek, label: "Day of Week (0=Sun, 6=Sat)", widget: number, value_type: int, min: 0, max: 6, hint: "0 Sunday, 1 Monday, 2 Tuesday, 3 Wednesday, 4 Thursday, 5 Friday, 6 Saturday." }
                  - { name: n, label: "Which week of the month (only for 'nth-of-month')", widget: number, value_type: int, min: 1, max: 5, required: false, hint: "Leave blank unless using 'nth-of-month'." }
              - { name: needsRsvp, label: "Needs RSVP?", widget: boolean, default: false, required: false, hint: "Turn on for events like Wednesday Supper or potlucks. An RSVP button shows up in the event details." }

  # =====================================================================
  # 8. ANNOUNCEMENTS — Weekly bulletin items shown on the homepage.
  # =====================================================================
  - name: announcements
    label: "Announcements"
    label_singular: "Announcement"
    folder: content/announcements
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} ({{date | date('YYYY-MM-DD')}})"
    sortable_fields: [date, pinned, title]
    fields:
      - { name: title, label: "Title", widget: string, hint: "Short headline. e.g. 'Wednesday supper tonight' or 'Communion this Sunday'." }
      - { name: date, label: "Date Posted", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: false, hint: "When this announcement was written. Used for sorting and the 'Posted X' label." }
      - { name: expires, label: "Auto-hide after this date", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: false, required: false, hint: "Optional. The announcement disappears from the site automatically after this date. Leave blank to keep it showing until you remove it manually." }
      - { name: pinned, label: "Pin to top?", widget: boolean, default: false, required: false, hint: "Pinned announcements show first with a small 'Pinned' badge. Use sparingly." }
      - { name: link, label: "Optional link", widget: string, required: false, default: "", hint: "Where the 'Learn more' button should go. Internal paths like '/calendar' or full URLs both work. Leave blank if no link." }
      - { name: linkLabel, label: "Link button text", widget: string, required: false, default: "", hint: "What the button says. e.g. 'See full menu', 'Sign up', 'Read more'. Defaults to 'Learn more' if left blank." }
      - { name: body, label: "Message", widget: text, hint: "1-2 sentences. Keep it short — link out for longer details." }

  # =====================================================================
  # 9. PAGE — The "Our Story" prose on /about.
  # =====================================================================
  - name: pages
    label: "Pages"
    delete: false
    files:
      - name: story
        label: "Our Story"
        file: content/story.md
        format: frontmatter
        fields:
          - { name: title, label: "Page Title", widget: string, default: "Our Story" }
          - { name: body, label: "Story", widget: markdown, hint: "Tell visitors the story of the church. Use the formatting toolbar — no need to write code." }
